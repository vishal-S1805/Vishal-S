<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f4f6f9; }
        .dashboard-container { max-width: 600px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .logout-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; }
        input { width: 75%; padding: 10px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .search-box { margin-top: 20px; display: flex; }
        .search-box button { width: 20%; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #f8f9fa; padding: 12px; margin-bottom: 8px; border-left: 5px solid #007bff; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h2>Welcome, <span id="userGreeting">Guest</span>! 👋</h2>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="search-box">
            <input type="text" id="searchName" placeholder="Type user name to search...">
            <button onclick="searchUsers()">Search</button>
        </div>

        <ul id="resultsList"></ul>
    </div>

    <script>
        // Security Guard Check: Ensure token exists
        if (!localStorage.getItem('authToken')) {
            window.location.href = 'index.html';
        }

        document.getElementById('userGreeting').innerText = localStorage.getItem('userName') || 'User';

        async function searchUsers() {
            const query = document.getElementById('searchName').value;
            const res = await fetch(`http://localhost:3000/users/search?name=${query}`);
            const users = await res.json();

            const list = document.getElementById('resultsList');
            list.innerHTML = '';

            if(users.length === 0) {
                list.innerHTML = '<li>No users found matches.</li>';
                return;
            }

            users.forEach(u => {
                list.innerHTML += `<li><strong>👤 Name:</strong> ${u.name} | <strong>✉️ Email:</strong> ${u.email}</li>`;
            });
        }

        // Day 17 Task: Clear token from localStorage on Logout
        function handleLogout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('userName');
            window.location.href = 'index.html'; // Kick back to login screen
        }
    </script>
</body>
</html>
